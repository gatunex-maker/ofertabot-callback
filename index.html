<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Callback</title></head>
<body style="font-family:sans-serif;padding:40px;text-align:center">
  <h1>✅ Code de autorização ML</h1>
  <p>Copie o código abaixo e cole no terminal:</p>
  <code id="code" style="display:block;background:#f0f0f0;padding:20px;
    font-size:16px;border-radius:8px;margin:20px auto;max-width:600px;
    word-break:break-all"></code>
  <script>
    const code = new URLSearchParams(window.location.search).get('code');
    document.getElementById('code').innerText = code || 'Nenhum code encontrado';
  </script>
</body>
</html>
